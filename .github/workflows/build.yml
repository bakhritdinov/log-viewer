name: Build and Release LogViewer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install NSIS
      run: choco install nsis

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.2'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'

    - name: Build and Package
      shell: pwsh
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS
        
        # Create Portable version (CMake now handles windeployqt via install script)
        mkdir dist/portable
        cmake --install build --prefix dist/portable
        
        # CPack will create both EXE (NSIS) and ZIP
        cpack --config build/CPackConfig.cmake -B dist/ -C Release
        
        # Organize artifacts
        if (Test-Path "dist/LogViewer-Windows-x64.zip") {
            Move-Item dist/LogViewer-Windows-x64.zip dist/LogViewer-Windows-Portable.zip -Force
        } else {
            # If CPack didn't create the zip in the expected name, zip the portable dir
            Compress-Archive -Path dist/portable/* -DestinationPath dist/LogViewer-Windows-Portable.zip -Force
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LogViewer-Windows-x64
        path: |
          dist/LogViewer-Windows-x64.exe
          dist/LogViewer-Windows-Portable.zip

  build-macos:
    name: Build macOS
    runs-on: macos-14
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: brew install ninja brotli zstd

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.2'
        host: 'mac'
        target: 'desktop'
        arch: 'clang_64'

    - name: Build and Package
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
        cmake --build build --config Release -j "$(sysctl -n hw.logicalcpu)"
        # Install to trigger deployment and signing
        mkdir -p dist/bundle
        DESTDIR=$PWD/dist/bundle cmake --install build --prefix /
        # Final sign for safety
        codesign --force --deep --sign - dist/bundle/LogViewer.app
        # Package
        cpack --config build/CPackConfig.cmake -B dist/ -C Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LogViewer-macOS-Universal
        path: dist/LogViewer-macOS-Universal.dmg

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev libxkbcommon-dev libegl1-mesa-dev \
          libdbus-1-dev libfontconfig1-dev libfreetype6-dev libice-dev libsm-dev \
          libx11-dev libx11-xcb-dev libxcb-icccm4-dev libxcb-image0-dev \
          libxcb-keysyms1-dev libxcb-randr0-dev libxcb-render-util0-dev \
          libxcb-render0-dev libxcb-shape0-dev libxcb-shm0-dev libxcb-sync-dev \
          libxcb-util-dev libxcb-xfixes0-dev libxcb-xinerama0-dev libxcb-xkb-dev \
          libxcb1-dev libxext-dev libxfixes-dev libxi-dev libxrender-dev \
          libxkbcommon-x11-dev binutils qt6-base-dev qt6-declarative-dev \
          qt6-multimedia-dev libqt6svg6-dev libvulkan-dev imagemagick libpng-dev \
          qml6-module-qtquick qml6-module-qtquick-controls qml6-module-qtquick-layouts \
          qml6-module-qtquick-templates qml6-module-qtquick-window

    - name: Build and Package AppImage
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -Wno-dev
        cmake --build build --config Release -j $(nproc)
        cmake --build build --target appimage

    - name: Build and Package DEB
      run: |
        cpack --config build/CPackConfig.cmake -B dist/ -C Release

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: LogViewer-Linux
        path: |
          dist/LogViewer-Linux.AppImage
          dist/*.deb

  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/LogViewer-Windows-x64.exe
          artifacts/LogViewer-Windows-Portable.zip
          artifacts/LogViewer-macOS-Universal.dmg
          artifacts/LogViewer-Linux.AppImage
          artifacts/*.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-chocolatey:
    name: Publish to Chocolatey
    needs: [release]
    runs-on: windows-latest
    # Chocolatey moderation can hold a release for days; don't block the rest of the pipeline.
    continue-on-error: true
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: LogViewer-Windows-x64
        path: artifacts

    - name: Lint Chocolatey scripts (ASCII-only)
      shell: pwsh
      run: |
        # Windows PowerShell 5.1 reads .ps1 without BOM as Windows-1252, so any
        # non-ASCII byte (em-dash, smart quotes, NBSP) is reinterpreted and can
        # turn into a stray quote that breaks the parser. Fail the build early.
        $files = Get-ChildItem -Path 'deploy/chocolatey' -Recurse -Include *.ps1,*.nuspec
        $bad = $files | Select-String -Pattern '[^\x00-\x7F]'
        if ($bad) {
          $bad | ForEach-Object {
            Write-Host ("::error file={0},line={1}::Non-ASCII byte at column {2}" -f $_.Path, $_.LineNumber, ($_.Matches[0].Index + 1))
            Write-Host "    $($_.Line)"
          }
          throw "Non-ASCII characters found in Chocolatey scripts. PowerShell 5.1 will misparse them on Windows."
        }
        Write-Host "OK: all Chocolatey scripts are ASCII-only ($($files.Count) files checked)."

    - name: Prepare Package
      shell: pwsh
      run: |
        $version = "${{ github.ref_name }}".TrimStart('v')
        $checksum = (Get-FileHash artifacts/LogViewer-Windows-x64.exe -Algorithm SHA256).Hash
        
        $nuspecPath = "deploy/chocolatey/log-viewer.nuspec"
        $nuspec = Get-Content $nuspecPath -Raw
        $nuspec = $nuspec.Replace("[[VERSION]]", $version)
        Set-Content $nuspecPath $nuspec
        
        $scriptPath = "deploy/chocolatey/tools/chocolateyInstall.ps1"
        $script = Get-Content $scriptPath -Raw
        $script = $script.Replace("[[VERSION]]", $version).Replace("[[CHECKSUM64]]", $checksum)
        Set-Content $scriptPath $script
        
        New-Item -ItemType Directory -Force -Path dist
        choco pack $nuspecPath --outputdirectory dist
        Get-ChildItem dist/

    - name: Push to Chocolatey
      shell: pwsh
      run: |
        $package = Get-ChildItem dist/*.nupkg | Select-Object -First 1
        if ($package) {
            choco push $package.FullName --source https://push.chocolatey.org/ --api-key ${{ secrets.CHOCO_API_KEY }}
        } else {
            Write-Error "No nupkg file found in dist/"
            exit 1
        }
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

  publish-homebrew:
    name: Publish to Homebrew Tap
    needs: [release]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download DMG
      uses: actions/download-artifact@v4
      with:
        name: LogViewer-macOS-Universal
        path: .

    - name: Update Cask
      run: |
        VERSION=$(echo "${{ github.ref_name }}" | sed 's/v//')
        SHA256=$(sha256sum LogViewer-macOS-Universal.dmg | awk '{print $1}')
        
        sed -e "s/\[\[VERSION\]\]/$VERSION/g" \
            -e "s/\[\[SHA256\]\]/$SHA256/g" \
            deploy/homebrew/log-viewer.rb.template > log-viewer.rb
            
    - name: Push to Tap
      uses: dmnemec/copy_file_to_another_repo_action@main
      env:
        API_TOKEN_GITHUB: ${{ secrets.TAP_GITHUB_TOKEN }}
      with:
        source_file: 'log-viewer.rb'
        destination_repo: '${{ github.repository_owner }}/homebrew-tap'
        destination_folder: 'Casks'
        user_email: 'action@github.com'
        user_name: 'GitHub Action'
        commit_message: 'Update LogViewer Cask to ${{ github.ref_name }}'

  publish-ppa:
    name: Publish to PPA (${{ matrix.distro }})
    needs: [release]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: [jammy, noble]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y devscripts debhelper build-essential dput gnupg

    - name: Import GPG key
      env:
        GPG_KEY: ${{ secrets.LAUNCHPAD_PPA_GPG_KEY }}
      run: |
        echo "$GPG_KEY" | gpg --import --batch --yes
        KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/ {print $5; exit}')
        echo "GPG_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"

    - name: Build source package
      env:
        # Must match the UID of LAUNCHPAD_PPA_GPG_KEY -- Launchpad rejects
        # uploads where the changelog signer's email does not match the key.
        DEBEMAIL: bobur.bakhritdinov@gmail.com
        DEBFULLNAME: Bobur Bakhritdinov
      run: |
        VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
        DISTRO=${{ matrix.distro }}
        PPA_REV="${VERSION}-1ppa${{ github.run_number }}~${DISTRO}"
        mkdir -p "build-ppa/log-viewer-${VERSION}"
        cp -r src CMakeLists.txt "build-ppa/log-viewer-${VERSION}/"
        cp -r deploy/debian "build-ppa/log-viewer-${VERSION}/"
        cd "build-ppa/log-viewer-${VERSION}"
        dch --create --package log-viewer -v "${PPA_REV}" \
            --distribution "${DISTRO}" \
            "Release ${VERSION} to PPA for ${DISTRO}"
        # -d skips dpkg-checkbuilddeps: build dependencies (cmake, qt6-*) are
        # resolved on the Launchpad builder farm, not on this runner.
        dpkg-buildpackage -S -sa -us -uc -d

    - name: Sign and upload to PPA
      run: |
        cd build-ppa
        debsign -k "${GPG_KEY_ID}" *.changes
        dput ppa:bakhritdinov/log-viewer *.changes
